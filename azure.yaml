# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: graphrag-demo

infra:
  provider: bicep
  path: azure

hooks:
  postprovision:
    windows:
      shell: pwsh
      run: azure/hooks/postprovision.ps1
    posix:
      shell: sh
      run: azure/hooks/postprovision.sh

services:
  server:
    host: containerapp
    project: ./server
    language: python

  client:
    host: containerapp
    project: ./client
    language: js
